# git-cliff configuration
# https://git-cliff.org/docs/configuration/

[changelog]
header = """
# Changelog\n\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{% if version %}\n
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}\n
{% else %}\n
## [Unreleased]\n
{% endif %}\n
{% for group, commits in commits | group_by(attribute="group") %}\n
### {{ group | striptags | trim | upper_first }}\n
{% for commit in commits %}\n
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}\n
  {% if commit.breaking %}[**breaking**] {% endif %}\n
  {{ commit.message | upper_first }}\n
{% endfor %}\n
{% endfor %}\n
"""
trim = true
footer = """
<!-- generated by git-cliff -->\n
"""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = [
  { pattern = "\\((\\w+)\\)!:", replace = "**${1}**: " },
  { pattern = "^Merge pull request #\\d+ from .*", replace = "" },
]
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^doc", group = "Documentation" },
  { message = "^style", group = "Styling" },
  { message = "^refactor", group = "Refactor" },
  { message = "^perf", group = "Performance" },
  { message = "^test", group = "Testing" },
  { message = "^chore", group = "Miscellaneous Tasks" },
  { body = "^.+", group = "Details" },
]
protect_breaking_commits = false
filter_commits = false
topo_order = false
sort_commits = "oldest"
